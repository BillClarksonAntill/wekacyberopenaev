###############################################################################
# OpenAEV – Docker Compose for Coolify
# Based on official OpenAEV-Platform/docker repository variable names
###############################################################################

services:

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────────────────
  pgsql:
    image: postgres:17-alpine
    restart: unless-stopped
    networks:
      openaev-net:
        aliases:
          - pgsql
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-openaev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-openaev}
    volumes:
      - pgsqldata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-openaev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Elasticsearch
  # ─────────────────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    networks:
      openaev-net:
        aliases:
          - elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.ml.enabled=false
      - xpack.security.enabled=false
      - thread_pool.search.queue_size=5000
      - "ES_JAVA_OPTS=-Xms${ELASTIC_MEMORY_SIZE:-512m} -Xmx${ELASTIC_MEMORY_SIZE:-512m}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 20
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────
  # RabbitMQ
  # ─────────────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    networks:
      openaev-net:
        aliases:
          - rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-openaev}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-changeme}
      - RABBITMQ_NODENAME=rabbit01@localhost
    volumes:
      - amqpdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # MinIO
  # ─────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    restart: unless-stopped
    command: server /data
    networks:
      openaev-net:
        aliases:
          - minio
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-openaev}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme12345}
    volumes:
      - s3data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────────────────────────────────
  # OpenAEV Platform
  # ─────────────────────────────────────────────────────────────────────────
  openaev:
    image: openaev/platform:latest
    restart: unless-stopped
    networks:
      openaev-net:
        aliases:
          - openaev
      coolify:
    depends_on:
      pgsql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # ── Application ──────────────────────────────────────────────────────
      OPENAEV_HOST:             ${OPENAEV_HOST:-localhost}
      OPENAEV_PORT:             ${APP_PORT:-8080}
      OPENAEV_EXTERNAL_SCHEME:  ${OPENAEV_EXTERNAL_SCHEME:-http}
      OPENAEV_ADMIN_EMAIL:            ${OPENAEV_ADMIN_EMAIL:-admin@example.com}
      OPENAEV_ADMIN_PASSWORD:         ${OPENAEV_ADMIN_PASSWORD:-changeme}
      OPENAEV_ADMIN_TOKEN:            ${OPENAEV_ADMIN_TOKEN:-changeme-uuid-token}
      OPENAEV_ADMIN_ENCRYPTION_KEY:   ${OPENAEV_ADMIN_ENCRYPTION_KEY:-changeme32charslongkeyhere12345}
      OPENAEV_ADMIN_ENCRYPTION_SALT:  ${OPENAEV_ADMIN_ENCRYPTION_SALT:-changeme8chars}
      OPENAEV_HEALTHCHECK_KEY:        ${OPENAEV_HEALTHCHECK_KEY:-changeme}

      # ── PostgreSQL ───────────────────────────────────────────────────────
      SPRING_DATASOURCE_URL:      jdbc:postgresql://pgsql:5432/${POSTGRES_DB:-openaev}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-openaev}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}

      # ── Elasticsearch ────────────────────────────────────────────────────
      ENGINE_URL: ${ENGINE_URL:-http://elasticsearch:9200}

      # ── RabbitMQ ─────────────────────────────────────────────────────────
      RABBITMQ_DEFAULT_USER:      ${RABBITMQ_DEFAULT_USER:-openaev}
      RABBITMQ_DEFAULT_PASS:      ${RABBITMQ_DEFAULT_PASS:-changeme}
      OPENAEV_RABBITMQ_HOSTNAME:  ${OPENAEV_RABBITMQ_HOSTNAME:-rabbitmq}
      OPENAEV_RABBITMQ_PORT:      ${OPENAEV_RABBITMQ_PORT:-5672}
      OPENAEV_RABBITMQ_USER:      ${OPENAEV_RABBITMQ_USER:-openaev}
      OPENAEV_RABBITMQ_PASS:      ${OPENAEV_RABBITMQ_PASS:-changeme}
      OPENAEV_RABBITMQ_VHOST:     "/"

      # ── MinIO ────────────────────────────────────────────────────────────
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-openaev}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme12345}
      MINIO_ENDPOINT:      ${MINIO_ENDPOINT:-minio}
      MINIO_PORT:          ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY:    ${MINIO_ACCESS_KEY:-openaev}
      MINIO_ACCESS_SECRET: ${MINIO_ACCESS_SECRET:-changeme12345}
      MINIO_BUCKET:        ${MINIO_BUCKET:-openaev}

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  pgsqldata:
  esdata:
  amqpdata:
  s3data:

# ─────────────────────────────────────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────────────────────────────────────
networks:
  openaev-net:
    driver: bridge
  coolify:
    external: true