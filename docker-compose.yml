###############################################################################
# OpenAEV – Docker Compose for Coolify
#
# Fill in every value marked  ← CHANGE THIS  before deploying.
# All secrets can alternatively be set as Coolify environment variables.
#
# Services:
#   openaev      – main platform  (port 8080)
#   postgres     – relational store
#   elasticsearch – search / index engine
#   rabbitmq     – message queue
#   minio        – S3-compatible object storage
###############################################################################

x-openaev-common: &openaev-common
  restart: unless-stopped
  networks:
    - openaev-net

services:

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    <<: *openaev-common
    image: postgres:15-alpine
    container_name: openaev-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-openaev}
      POSTGRES_USER:     ${POSTGRES_USER:-openaev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}   # ← CHANGE THIS
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openaev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Elasticsearch
  # ─────────────────────────────────────────────────────────────────────────
  elasticsearch:
    <<: *openaev-common
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: openaev-elasticsearch
    environment:
      discovery.type:               single-node
      xpack.security.enabled:       "false"
      ES_JAVA_OPTS:                 "-Xms1g -Xmx1g"
      cluster.name:                 openaev-cluster
      bootstrap.memory_lock:        "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────────────────────────────────
  # RabbitMQ
  # ─────────────────────────────────────────────────────────────────────────
  rabbitmq:
    <<: *openaev-common
    image: rabbitmq:3.13-management-alpine
    container_name: openaev-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-openaev}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}   # ← CHANGE THIS
      RABBITMQ_DEFAULT_VHOST: openaev
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # MinIO  (S3-compatible object storage)
  # ─────────────────────────────────────────────────────────────────────────
  minio:
    <<: *openaev-common
    image: minio/minio:latest
    container_name: openaev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-openaev}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme12345}   # ← CHANGE THIS (min 8 chars)
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # MinIO bucket initialiser – runs once then exits
  minio-init:
    image: minio/mc:latest
    container_name: openaev-minio-init
    networks:
      - openaev-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-openaev} ${MINIO_ROOT_PASSWORD:-changeme12345} &&
        mc mb --ignore-existing local/${MINIO_BUCKET:-openaev-files}
      "
    restart: "no"

  # ─────────────────────────────────────────────────────────────────────────
  # OpenAEV Platform
  # ─────────────────────────────────────────────────────────────────────────
  openaev:
    <<: *openaev-common
    image: openaev/platform:latest
    container_name: openaev
    ports:
      - "${APP_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # ── Application ────────────────────────────────────────────────────
      APP__ADMIN__EMAIL:    ${APP_ADMIN_EMAIL:-admin@example.com}   # ← CHANGE THIS
      APP__ADMIN__PASSWORD: ${APP_ADMIN_PASSWORD:-changeme}          # ← CHANGE THIS
      APP__ADMIN__TOKEN:    ${APP_ADMIN_TOKEN:-changeme-uuid-token}  # ← CHANGE THIS (use uuidgen)
      # Optional: set if deployed behind a sub-path (e.g. /openaev)
      # APP__BASE_PATH: /openaev

      # ── PostgreSQL ──────────────────────────────────────────────────────
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB:-openaev}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-openaev}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}

      # ── Elasticsearch ───────────────────────────────────────────────────
      ELASTICSEARCH_URL: http://elasticsearch:9200

      # ── RabbitMQ ────────────────────────────────────────────────────────
      SPRING_RABBITMQ_HOST:     rabbitmq
      SPRING_RABBITMQ_PORT:     "5672"
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-openaev}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-changeme}
      SPRING_RABBITMQ_VIRTUALHOST: openaev

      # ── MinIO / S3 ──────────────────────────────────────────────────────
      MINIO_ENDPOINT:    http://minio:9000
      MINIO_ACCESS_KEY:  ${MINIO_ROOT_USER:-openaev}
      MINIO_SECRET_KEY:  ${MINIO_ROOT_PASSWORD:-changeme12345}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET:-openaev-files}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  elasticsearch-data:
  rabbitmq-data:
  minio-data:

# ─────────────────────────────────────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────────────────────────────────────
networks:
  openaev-net:
    driver: bridge