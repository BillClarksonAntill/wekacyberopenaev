###############################################################################
# OpenAEV – Docker Compose for Coolify
#
# Fill in every value marked  ← CHANGE THIS  before deploying.
# All secrets can alternatively be set as Coolify environment variables.
###############################################################################

services:

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    networks:
      openaev-net:
        aliases:
          - postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-openaev}
      POSTGRES_USER:     ${POSTGRES_USER:-openaev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openaev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Elasticsearch
  # ─────────────────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    networks:
      openaev-net:
        aliases:
          - elasticsearch
    environment:
      discovery.type:         single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS:           "-Xms512m -Xmx512m"
      cluster.name:           openaev-cluster
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 20
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────
  # RabbitMQ
  # ─────────────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    networks:
      openaev-net:
        aliases:
          - rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER:  ${RABBITMQ_USER:-openaev}
      RABBITMQ_DEFAULT_PASS:  ${RABBITMQ_PASSWORD:-changeme}
      RABBITMQ_DEFAULT_VHOST: openaev
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # MinIO  (S3-compatible object storage)
  # ─────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    networks:
      openaev-net:
        aliases:
          - minio
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-openaev}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme12345}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # MinIO bucket initialiser - runs once then exits
  minio-init:
    image: minio/mc:latest
    networks:
      - openaev-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-openaev} ${MINIO_ROOT_PASSWORD:-changeme12345} &&
        mc mb --ignore-existing local/${MINIO_BUCKET:-openaev}
      "
    restart: "no"

  # ─────────────────────────────────────────────────────────────────────────
  # OpenAEV Platform
  # ─────────────────────────────────────────────────────────────────────────
  openaev:
    image: openaev/platform:latest
    restart: unless-stopped
    networks:
      openaev-net:
        aliases:
          - openaev
    ports:
      - "${APP_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # ── Admin (OpenBAS legacy naming) ────────────────────────────────────
      OPENBAS_ADMIN_EMAIL:           ${OPENBAS_ADMIN_EMAIL:-admin@example.com}
      OPENBAS_ADMIN_PASSWORD:        ${OPENBAS_ADMIN_PASSWORD:-changeme}
      OPENBAS_ADMIN_TOKEN:           ${OPENBAS_ADMIN_TOKEN:-changeme-uuid-token}
      OPENBAS_ADMIN_ENCRYPTION_SALT: ${OPENBAS_ADMIN_ENCRYPTION_SALT:-changeme16chars!}

      # ── PostgreSQL ───────────────────────────────────────────────────────
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB:-openaev}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-openaev}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}

      # ── Elasticsearch ────────────────────────────────────────────────────
      ENGINE_URL: ${ENGINE_URL:-http://elasticsearch:9200}

      # ── RabbitMQ (OpenBAS legacy naming) ─────────────────────────────────
      OPENBAS_RABBITMQ_HOSTNAME: ${OPENBAS_RABBITMQ_HOSTNAME:-rabbitmq}
      OPENBAS_RABBITMQ_PORT:     ${OPENBAS_RABBITMQ_PORT:-5672}
      OPENBAS_RABBITMQ_USER:     ${OPENBAS_RABBITMQ_USER:-openaev}
      OPENBAS_RABBITMQ_PASS:     ${OPENBAS_RABBITMQ_PASS:-changeme}
      OPENBAS_RABBITMQ_VHOST:    ${OPENBAS_RABBITMQ_VHOST:-openaev}

      # ── MinIO / S3 ───────────────────────────────────────────────────────
      MINIO_ENDPOINT:      ${MINIO_ENDPOINT:-minio}
      MINIO_PORT:          ${MINIO_PORT:-9000}
      MINIO_BUCKET:        ${MINIO_BUCKET:-openaev}
      MINIO_ACCESS_KEY:    ${MINIO_ACCESS_KEY:-openaev}
      MINIO_ACCESS_SECRET: ${MINIO_ACCESS_SECRET:-changeme12345}

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  elasticsearch-data:
  rabbitmq-data:
  minio-data:

# ─────────────────────────────────────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────────────────────────────────────
networks:
  openaev-net:
    driver: bridge